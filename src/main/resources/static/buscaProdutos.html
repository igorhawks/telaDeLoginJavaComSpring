<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Produtos</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="buscaProdutos.css">
</head>
<body>

<div class="container">

    <h2>Lista de Produtos</h2>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Preço</th>
        </tr>
        </thead>
        <tbody id="tabelaProdutos">
        </tbody>
    </table>

    <div class="message" id="mensagem"></div>

    <button class="btn" onclick="voltar()">
        Voltar para Tela Inicial
    </button>

</div>

<script>

    const token = localStorage.getItem("token");

    if (!token) {
        window.location.href = "index.html";
    }

    async function carregarProdutos() {

        try {

                const response = await fetch("http://72.60.55.125:8080/product", {
                method: "GET",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                }
            });

            if (!response.ok) {
                throw new Error("Erro ao buscar produtos");
            }

            const produtos = await response.json();

            const tabela = document.getElementById("tabelaProdutos");

            tabela.innerHTML = "";

            if (produtos.length === 0) {
                document.getElementById("mensagem").innerText = "Nenhum produto cadastrado.";
                return;
            }

            produtos.forEach(produto => {

                const linha = document.createElement("tr");

                linha.innerHTML = `
                    <td>${produto.id}</td>
                    <td>${produto.name}</td>
                    <td>R$ ${Number(produto.price).toFixed(2)}</td>
                `;

                tabela.appendChild(linha);

            });

        } catch (error) {

            document.getElementById("mensagem").innerText = "Erro ao carregar produtos.";

            console.error(error);

        }

    }

    function voltar() {
        window.location.href = "telainicial.html";
    }

    carregarProdutos();

</script>

</body>
</html>
