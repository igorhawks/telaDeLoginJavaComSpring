<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela Inicial</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 30px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .title {
            font-size: 20px;
            font-weight: 600;
        }

        .logout-btn {
            padding: 10px 16px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            transition: 0.2s;
        }

        .logout-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(220,38,38,0.4);
        }

        main {
            padding: 40px 25px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            padding: 25px;
            border-radius: 18px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .card h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .card p {
            font-size: 14px;
            opacity: 0.8;
        }
        .card {
            cursor: pointer;
        }
        .menu-card {
            position: relative;
            cursor: pointer;
        }

        .submenu {
            margin-top: 15px;
            display: none;
            flex-direction: column;
            gap: 8px;
        }

        .menu-card:hover .submenu {
            display: flex;
        }

        .submenu button {
            padding: 10px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            color: white;
            transition: 0.2s;
        }

        .submenu button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(14,165,233,0.4);
        }
        @media (max-width: 480px) {

            header {
                flex-direction: column;
                gap: 10px;
            }

            main {
                padding: 25px 18px;
            }

        }

    </style>
</head>
<body>

<header>

    <div class="title">
        Sistema - Tela Inicial
    </div>

    <button class="logout-btn" onclick="logout()">
        Sair
    </button>

</header>

<main>

    <h2 style="margin-bottom: 25px;">
        Bem-vindo ao sistema
    </h2>

    <div class="cards">

        <div class="card">
            <h3>Usuários</h3>
            <p>Gerenciar usuários cadastrados no sistema.</p>
        </div>

        <div class="card menu-card">

            <h3>Produtos</h3>
            <p>Cadastro e controle de produtos.</p>

            <div class="submenu">

                <button onclick="irParaCadastroProduto()">
                    Cadastrar Produto
                </button>

                <button onclick="irParaListarProdutos()">
                    Listar Produtos
                </button>

            </div>

        </div>

        <div class="card">
            <h3>Relatórios</h3>
            <p>Visualizar relatórios do sistema.</p>
        </div>

        <div class="card">
            <h3>Configurações</h3>
            <p>Alterar configurações da aplicação.</p>
        </div>

    </div>

</main>

<script>

/* Proteção simples: se não tiver token, volta para login */
const token = localStorage.getItem("token");

if (!token) {
    window.location.href = "index.html";
}

function logout() {

    localStorage.removeItem("token");

    window.location.href = "index.html";

}

function irParaCadastroProduto() {
    window.location.href = "cadastroproduto.html";
}

function irParaListarProdutos() {
    window.location.href = "buscaProdutos.html";
}

</script>

</body>
</html>
